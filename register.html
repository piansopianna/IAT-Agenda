<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Event - IAT</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="ui.navigate('index.html')">
                <div class="bg-brand-600 text-white p-2 rounded-lg"><i data-lucide="calendar" class="w-5 h-5"></i></div>
                <span class="font-title font-bold text-xl text-slate-900">IAT Agenda</span>
            </div>
            <div>
                <button onclick="ui.navigate('login.html')" class="text-sm font-medium text-slate-600 hover:text-brand-600 flex items-center gap-1 transition-colors">
                    <i data-lucide="shield" class="w-4 h-4"></i> Admin Panel
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Register Section -->
        <section class="fade-in">
            <button onclick="ui.navigate('index.html')" class="mb-6 flex items-center gap-1 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
            </button>
            
            <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-brand-50 p-6 border-b border-brand-100">
                    <div class="flex gap-2 mb-3">
                        <span class="inline-block px-3 py-1 bg-brand-100 text-brand-700 text-xs font-semibold rounded-full flex items-center gap-1" id="reg-event-date"><i data-lucide="calendar" class="w-3 h-3"></i> Tanggal</span>
                        <span class="inline-block px-3 py-1 bg-white border border-brand-200 text-slate-600 text-xs font-semibold rounded-full flex items-center gap-1" id="reg-event-tempat"><i data-lucide="map-pin" class="w-3 h-3"></i> Tempat</span>
                    </div>
                    <h2 class="font-title text-2xl font-bold text-slate-900" id="reg-event-title">Judul Event</h2>
                    <p class="text-brand-700 text-sm mt-1 font-medium" id="reg-event-tema">Tema Event</p>
                </div>
                <div class="p-6">
                    <form id="form-register" onsubmit="register.submitRegistration(event)">
                        <input type="hidden" id="reg-event-id">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                                <input type="text" id="reg-name" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Email Aktif</label>
                                <input type="email" id="reg-email" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">No. WhatsApp</label>
                                <input type="tel" id="reg-wa" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="08123456789">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Instansi / Organisasi</label>
                                <input type="text" id="reg-instansi" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                            </div>
                        </div>
                        <div class="mt-8">
                            <button type="submit" id="btn-submit-reg" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                <span>Daftar Sekarang</span>
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

    </main>

    <!-- Global Loading Overlay -->
    <div id="overlay-loading" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-10 h-10 text-white animate-spin mb-3"></i>
        <p id="loading-text" class="text-white font-medium text-sm text-center whitespace-pre-line">Memproses...</p>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script src="assets/js/common-app.js"></script>
    <script>
        // ========================================
        // REGISTER PAGE LOGIC
        // ========================================

        const register = {
            eventData: {},

            loadEventData: () => {
                const params = new URLSearchParams(window.location.search);
                const eventId = params.get('eventId');
                const eventName = params.get('eventName');
                const eventTema = params.get('eventTema');
                const eventTempat = params.get('eventTempat');
                const eventTanggal = params.get('eventTanggal');

                if (!eventId) {
                    ui.showToast('Event tidak ditemukan', 'error');
                    setTimeout(() => ui.navigate('index.html'), 2000);
                    return;
                }

                register.eventData = {
                    id: eventId,
                    nama: eventName,
                    tema: eventTema,
                    tempat: eventTempat,
                    tanggal: eventTanggal
                };

                document.getElementById('reg-event-id').value = eventId;
                document.getElementById('reg-event-title').innerText = eventName;
                document.getElementById('reg-event-tema').innerText = eventTema;
                document.getElementById('reg-event-tempat').innerHTML = `<i data-lucide="map-pin" class="w-3 h-3"></i> ${eventTempat}`;
                
                const formattedDate = utils.formatDate(eventTanggal);
                document.getElementById('reg-event-date').innerHTML = `<i data-lucide="calendar" class="w-3 h-3"></i> ${formattedDate}`;
                
                lucide.createIcons();
            },

            submitRegistration: async (e) => {
                e.preventDefault();
                const payload = {
                    eventId: document.getElementById('reg-event-id').value,
                    nama: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    whatsapp: document.getElementById('reg-wa').value,
                    institusi: document.getElementById('reg-instansi').value
                };

                ui.showLoading(true, 'Mengirim data...');
                const res = await api.call('register', payload); 
                ui.showLoading(false);

                if (res.status === 'success') {
                    ui.showToast('Pendaftaran berhasil!');
                    alert(`PENDAFTARAN BERHASIL!\n\nID Sertifikat Anda: ${res.certId || 'Akan dikirimkan'}\nSimpan ID ini untuk validasi sertifikat nanti.`);
                    
                    document.getElementById('form-register').reset();
                    setTimeout(() => ui.navigate('index.html'), 1000);
                } else {
                    ui.showToast(res.message || 'Pendaftaran gagal', 'error');
                }
            }
        };

        // Load event data when page loads
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js');
            }
            register.loadEventData();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - IAT</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="ui.navigate('index.html')">
                <div class="bg-brand-600 text-white p-2 rounded-lg"><i data-lucide="calendar" class="w-5 h-5"></i></div>
                <span class="font-title font-bold text-xl text-slate-900">IAT Agenda</span>
            </div>
            <div>
                <button onclick="ui.navigate('index.html')" class="text-sm font-medium text-slate-600 hover:text-brand-600 flex items-center gap-1 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-center">
        
        <!-- Login Section -->
        <section class="w-full fade-in">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mt-10">
                <div class="text-center mb-8">
                    <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-600">
                        <i data-lucide="lock" class="w-6 h-6"></i>
                    </div>
                    <h2 class="font-title text-2xl font-bold text-slate-900">Login Admin</h2>
                    <p class="text-slate-500 text-sm mt-1">Sesuai data Sheet 'AkunAdmin'</p>
                </div>
                <form onsubmit="login.handleLogin(event)">
                    <div class="mb-4 text-left">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Admin</label>
                        <input type="email" id="admin-email" required placeholder="admin@email.com" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                    </div>
                    <div class="mb-6 text-left">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kata Sandi</label>
                        <input type="password" id="admin-pwd" required placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-4 rounded-lg transition-colors">Masuk Sistem</button>
                </form>
            </div>
        </section>

    </main>

    <!-- Global Loading Overlay -->
    <div id="overlay-loading" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-10 h-10 text-white animate-spin mb-3"></i>
        <p id="loading-text" class="text-white font-medium text-sm text-center whitespace-pre-line">Memproses...</p>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script src="assets/js/common-app.js"></script>
    <script>
        // ========================================
        // LOGIN PAGE LOGIC
        // ========================================

        const login = {
            handleLogin: async (e) => {
                e.preventDefault();
                const payload = {
                    email: document.getElementById('admin-email').value,
                    password: document.getElementById('admin-pwd').value
                };
                
                ui.showLoading(true, 'Memverifikasi...');
                const res = await api.call('login', payload);
                ui.showLoading(false);

                if (res.status === 'success') {
                    // Store authentication token in sessionStorage
                    sessionStorage.setItem('adminAuth', 'true');
                    document.getElementById('admin-pwd').value = '';
                    ui.showToast('Login berhasil');
                    setTimeout(() => ui.navigate('admin.html'), 1000);
                } else {
                    ui.showToast(res.message || 'Email / Password Salah', 'error');
                }
            }
        };

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
